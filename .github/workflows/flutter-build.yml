name: Build Flutter APK & AAB

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install proot binary dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils zstd

      - name: Fetch PRoot binaries from Termux
        run: bash scripts/fetch-proot-binaries.sh

      - name: Verify jniLibs
        run: |
          echo "=== jniLibs contents ==="
          find flutter_app/android/app/src/main/jniLibs -type f -name "*.so" -exec ls -la {} \;
          echo "=== Total files ==="
          find flutter_app/android/app/src/main/jniLibs -type f -name "*.so" | wc -l

      - name: Get dependencies
        run: cd flutter_app && flutter pub get

      - name: Build APK (arm64-v8a)
        run: cd flutter_app && flutter build apk --release --target-platform android-arm64

      - name: Build APK (universal)
        run: cd flutter_app && flutter build apk --release

      - name: Build AAB
        run: cd flutter_app && flutter build appbundle --release

      - name: Upload APK arm64
        uses: actions/upload-artifact@v4
        with:
          name: stableclaw-arm64-v8a
          path: flutter_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload APK universal
        uses: actions/upload-artifact@v4
        with:
          name: stableclaw-universal
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: stableclaw-bundle
          path: flutter_app/build/app/outputs/bundle/release/app-release.aab

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/stableclaw-arm64-v8a/app-arm64-v8a-release.apk
            artifacts/stableclaw-universal/app-release.apk
            artifacts/stableclaw-bundle/app-release.aab
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
